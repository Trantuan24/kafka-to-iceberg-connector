# ===== TRAM QUAN TRAC MOI TRUONG - ICEBERG SINK =====
# Strategy: APPEND-ONLY with JSON parsing + Custom SMT
# Input: {"data": [...], "length": 2, "key": "MaTram", "type": "INSERT", "version": 1, "ngay_cap_nhat": "..."}
# Output: 7 fields (id, record, ngay_cap_nhat, length, key, type, version)

# ===== CONNECTOR IDENTITY =====
name=sink.tram_quan_trac

# ===== KAFKA CONFIG =====
topics=tram_quan_trac
connector.class=org.apache.iceberg.connect.IcebergSinkConnector
tasks.max=1

# ===== ICEBERG TABLE CONFIG =====
iceberg.tables=default.tram_quan_trac
iceberg.tables.auto-create-enabled=true
iceberg.tables.evolve-schema-enabled=true
iceberg.tables.schema-force-optional=true
iceberg.table.default.tram_quan_trac.id-columns=id

# ===== FORMAT VERSION =====
iceberg.table.write.format.default=v1
iceberg.table.default.tram_quan_trac.write.format.default=v1

# ===== CATALOG CONFIG - HIVE METASTORE =====
iceberg.catalog.type=hive
iceberg.catalog.uri=thrift://hive-metastore:9083
iceberg.catalog.warehouse=s3a://bucket/warehouse/
iceberg.catalog.io-impl=org.apache.iceberg.aws.s3.S3FileIO

# ===== S3/MinIO CONFIG =====
iceberg.catalog.s3.endpoint=http://minio:9000
iceberg.catalog.s3.path-style-access=true
iceberg.catalog.s3.access-key-id=minioadmin
iceberg.catalog.s3.secret-access-key=minioadmin
iceberg.catalog.s3.region=us-east-1

# ===== COMMIT CONFIG =====
iceberg.control.commit.interval-ms=10000
iceberg.control.commit.timeout-ms=30000

# ===== CONVERTER CONFIG =====
# Parse JSON to extract fields
value.converter=org.apache.kafka.connect.json.JsonConverter
value.converter.schemas.enable=false
key.converter=org.apache.kafka.connect.storage.StringConverter

# ===== SMT CHAIN =====
# Order: InsertOffset -> DataToString -> RenameField -> Cast
transforms=insertId,dataToString,renameData,castAll

# SMT 1: InsertField - Add field "id" using Kafka offset
transforms.insertId.type=org.apache.kafka.connect.transforms.InsertField$Value
transforms.insertId.offset.field=id

# SMT 2: Custom SMT - Convert "data" array to JSON string
transforms.dataToString.type=com.example.kafka.connect.smt.JsonFieldToString$Value
transforms.dataToString.field=data

# SMT 3: ReplaceField - Rename "data" to "record"
transforms.renameData.type=org.apache.kafka.connect.transforms.ReplaceField$Value
transforms.renameData.renames=data:record

# SMT 4: Cast - Convert types to STRING
transforms.castAll.type=org.apache.kafka.connect.transforms.Cast$Value
transforms.castAll.spec=id:string,version:string,length:string,ngay_cap_nhat:string

# ===== ERROR HANDLING =====
errors.tolerance=none
errors.log.enable=true
errors.log.include.messages=true

# ===== EXPECTED SCHEMA =====
# id: STRING (Kafka offset, e.g., "0")
# record: STRING (data array as JSON string)
# ngay_cap_nhat: STRING (from ngay_cap_nhat field in JSON)
# length: STRING (from length field)
# key: STRING (from key field, e.g., "MaTram")
# type: STRING (from type field, e.g., "INSERT")
# version: STRING (from version field)
