# ===== HEALTHCARE DATA PIPELINE V1.3 - PRODUCTION COMPATIBLE =====
# Connector: Iceberg 1.7.x (with format-version=1 for compatibility)
# Hive Metastore: 4.0.0 (compatible with Hive 2.3.9 clients)
# Target: Spark 3.5.1 + Iceberg 1.4.2
# Schema: (id STRING, record STRING, ngay_cap_nhat STRING)

# ===== CONNECTOR IDENTITY =====
name=sink.y_te_831_v3

# ===== KAFKA CONFIG =====
topics=y_te_831
connector.class=org.apache.iceberg.connect.IcebergSinkConnector
tasks.max=1

# ===== ICEBERG TABLE CONFIG =====
iceberg.tables=default.y_te_831_final
iceberg.tables.auto-create-enabled=true
iceberg.tables.evolve-schema-enabled=true
# Force schema: all fields as STRING
iceberg.tables.schema-force-optional=true
iceberg.table.default.y_te_831_final.id-columns=id

# ===== FORMAT VERSION (CRITICAL FOR PRODUCTION!) =====
# Force format version 1 for compatibility with Spark 3.5.1 + Iceberg 1.4.2
iceberg.table.write.format.default=v1
iceberg.table.default.y_te_831_final.write.format.default=v1

# ===== CATALOG CONFIG - HIVE METASTORE =====
iceberg.catalog.type=hive
iceberg.catalog.uri=thrift://hive-metastore:9083
iceberg.catalog.warehouse=s3a://bucket/warehouse/
iceberg.catalog.io-impl=org.apache.iceberg.aws.s3.S3FileIO

# ===== S3/MinIO CONFIG =====
iceberg.catalog.s3.endpoint=http://minio:9000
iceberg.catalog.s3.path-style-access=true
iceberg.catalog.s3.access-key-id=minioadmin
iceberg.catalog.s3.secret-access-key=minioadmin
iceberg.catalog.s3.region=us-east-1

# ===== COMMIT CONFIG =====
iceberg.control.commit.interval-ms=10000
iceberg.control.commit.timeout-ms=30000

# ===== CONVERTER CONFIG (CRITICAL!) =====
# Read message as STRING, do NOT parse JSON
value.converter=org.apache.kafka.connect.storage.StringConverter
key.converter=org.apache.kafka.connect.storage.StringConverter

# ===== SMT CHAIN (CRITICAL!) =====
# Order: HoistField -> InsertOffset -> InsertTimestamp -> Cast to String
transforms=hoist,insertId,insertTimestamp,castId,castTimestamp

# SMT 1: HoistField - Wrap string into field "record"
transforms.hoist.type=org.apache.kafka.connect.transforms.HoistField$Value
transforms.hoist.field=record

# SMT 2: InsertField - Add field "id" using Kafka offset (BIGINT)
transforms.insertId.type=org.apache.kafka.connect.transforms.InsertField$Value
transforms.insertId.offset.field=id

# SMT 3: InsertField - Add field "ngay_cap_nhat" with timestamp
transforms.insertTimestamp.type=org.apache.kafka.connect.transforms.InsertField$Value
transforms.insertTimestamp.timestamp.field=ngay_cap_nhat

# SMT 4: Cast - Convert id from BIGINT to STRING
transforms.castId.type=org.apache.kafka.connect.transforms.Cast$Value
transforms.castId.spec=id:string

# SMT 5: Cast - Convert ngay_cap_nhat from TIMESTAMP to STRING
transforms.castTimestamp.type=org.apache.kafka.connect.transforms.Cast$Value
transforms.castTimestamp.spec=ngay_cap_nhat:string

# ===== ERROR HANDLING =====
errors.tolerance=none
errors.log.enable=true
errors.log.include.messages=true
