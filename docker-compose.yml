volumes:
  data: {}
  postgres-data: {}

services:
  # PostgreSQL for Hive Metastore
  postgres:
    image: postgres:15
    hostname: postgres
    environment:
      - POSTGRES_USER=hive
      - POSTGRES_PASSWORD=hive
      - POSTGRES_DB=metastore
    ports:
      - 5432:5432
    volumes:
      - postgres-data:/var/lib/postgresql/data

  # Hive Metastore
  hive-metastore:
    build:
      context: .
      dockerfile: Dockerfile.hive
    hostname: hive-metastore
    depends_on:
      - postgres
      - minio
    ports:
      - 9083:9083
    volumes:
      - ./hive-site.xml:/opt/hive/conf/hive-site.xml
    environment:
      - SERVICE_NAME=metastore
      - DB_DRIVER=postgres
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - AWS_REGION=us-east-1

  minio:
    image: minio/minio
    hostname: minio
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    ports:
      - 9000:9000
      - 9001:9001
    volumes:
      - data:/data
    command: server /data --console-address ":9001"

  create-bucket:
    image: minio/mc
    depends_on:
      - minio
    volumes:
      - data:/data
    entrypoint: mc mb /data/bucket

  create-topics:
    image: confluentinc/cp-kafka:8.0.3
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint:
      - bash
      - -c
      - |
        echo "Waiting for Kafka to be ready..."
        sleep 5
        echo "Creating topics..."
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic test1 --partitions 1 --replication-factor 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic y_te_831 --partitions 1 --replication-factor 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic tram_quan_trac --partitions 1 --replication-factor 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic qtmt-tramquantrac --partitions 1 --replication-factor 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic qtmt-quantrackhithai --partitions 1 --replication-factor 1
        echo "Topics created successfully"
        kafka-topics --bootstrap-server kafka:9092 --list
        
  kafka:
    image: 'confluentinc/cp-kafka:8.0.3'
    hostname: kafka
    container_name: kafka
    ports:
      - 9092:9092
      - 29092:29092
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENERS: BROKER://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: BROKER://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: BROKER:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: BROKER
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_JMX_PORT: 9101
      KAFKA_JMX_HOSTNAME: localhost
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_OFFSETS_TOPIC_NUM_PARTITIONS: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: E-JXLvCaTiaUYDb1LwZ1JQ
    healthcheck:
      test: [ "CMD", "nc", "-z", "localhost", "9092" ]

  # Kafka Connect — build local từ Dockerfile.connect (dùng plugins/ ở root)
  connect:
    build:
      context: .
      dockerfile: Dockerfile.connect
    depends_on:
      kafka:
        condition: service_healthy
    hostname: connect
    ports:
      - 8083:8083
    volumes:
      - ./configs:/test/configs
    environment:
      CONNECT_REST_ADVERTISED_HOST_NAME: connect
      CONNECT_REST_PORT: 8083
      CONNECT_GROUP_ID: kc
      CONNECT_CONFIG_STORAGE_TOPIC: kc-config
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_OFFSET_STORAGE_TOPIC: kc-offsets
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_STATUS_STORAGE_TOPIC: kc-storage
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_PLUGIN_PATH: /usr/share/java,/usr/share/confluent-hub-components
      CONNECT_BOOTSTRAP_SERVERS: kafka:9092
      CONNECT_OFFSET_FLUSH_INTERVAL_MS: 10000
      KAFKA_HEAP_OPTS: "-Xms512M -Xmx4G"
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      CONNECT_LOG4J_LOGGERS: "org.apache.iceberg.connect=DEBUG,com.example.kafka.connect.smt=DEBUG"
    entrypoint:
      - bash
      - -c
      - |
        echo "Waiting for Hive Metastore to be ready..."
        sleep 30
        echo "Starting Kafka Connect..."
        /etc/confluent/docker/run
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  trino:
    image: trinodb/trino:468
    depends_on:
      - hive-metastore
      - minio
    hostname: trino
    ports:
      - 8080:8080
    environment:
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
    volumes:
      - ./trino-catalog:/etc/trino/catalog
