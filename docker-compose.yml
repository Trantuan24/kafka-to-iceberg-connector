volumes:
  data: {}

services:
  minio:
    image: minio/minio
    hostname: minio
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    ports:
      - 9000:9000
      - 9001:9001
    volumes:
      - data:/data
    command: server /data --console-address ":9001"

  create-bucket:
    image: minio/mc
    depends_on:
      - minio
    volumes:
      - data:/data
    entrypoint: mc mb /data/bucket

  iceberg:
    image: apache/iceberg-rest-fixture
    depends_on:
      - create-bucket
    hostname: iceberg
    ports:
      - 8181:8181
    environment:
      - AWS_REGION=us-east-1
      - CATALOG_WAREHOUSE=s3://bucket/warehouse/
      - CATALOG_URI=jdbc:sqlite:file:/tmp/iceberg_rest_mode=memory
      - CATALOG_IO__IMPL=org.apache.iceberg.aws.s3.S3FileIO
      - CATALOG_S3_ENDPOINT=http://minio:9000
      - CATALOG_S3_PATH__STYLE__ACCESS=true
      - CATALOG_S3_ACCESS__KEY__ID=minioadmin
      - CATALOG_S3_SECRET__ACCESS__KEY=minioadmin

  zookeeper-kafka:
    image: 'confluentinc/cp-zookeeper:7.8.1'
    container_name: 'zookeeper-kafka'
    restart: 'unless-stopped'
    ports:
      - '2181:2181'
    environment:
      - 'ZOOKEEPER_CLIENT_PORT=2181'
    healthcheck:
      test: 'echo stat | nc localhost $$ZOOKEEPER_CLIENT_PORT'
  kafka:
    image: 'confluentinc/cp-kafka:8.0.3'
    hostname: kafka
    container_name: kafka
  #    restart: 'unless-stopped'
    depends_on:
      - 'zookeeper-kafka'
    ports:
      - 9092:9092
      - 29092:29092
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENERS: BROKER://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: BROKER://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: BROKER:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: BROKER
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_JMX_PORT: 9101
      KAFKA_JMX_HOSTNAME: localhost
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_OFFSETS_TOPIC_NUM_PARTITIONS: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: E-JXLvCaTiaUYDb1LwZ1JQ
    healthcheck:
      test: [ "CMD", "nc", "-z", "localhost", "9092" ]

  connect:
    image: confluentinc/cp-kafka-connect:8.0.3
    depends_on:
      - kafka
      - iceberg
      - minio
    hostname: connect
    ports:
      - 8083:8083
    volumes:
      - ./plugins:/test/kafka-connect
      # - ./plugins/:/usr/local/share/kafka/plugins/
      - ./configs:/test/configs
    environment:
      # CONNECT_REST_ADVERTISED_HOST_NAME: localhost
      # CONNECT_REST_PORT: 8083
      # CONNECT_GROUP_ID: kc
      # CONNECT_CONFIG_STORAGE_TOPIC: kc-config
      # CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
      # CONNECT_OFFSET_STORAGE_TOPIC: kc-offsets
      # CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
      # CONNECT_STATUS_STORAGE_TOPIC: kc-storage
      # CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1
      # CONNECT_KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      # CONNECT_KEY_CONVERTER_SCHEMAS_ENABLE: false
      # CONNECT_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      # CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: false
      # CONNECT_PLUGIN_PATH: /usr/local/share/kafka/plugins/
      # CONNECT_BOOTSTRAP_SERVERS: kafka:9092
      # CONNECT_OFFSET_FLUSH_INTERVAL_MS: 500


      CONNECT_REST_ADVERTISED_HOST_NAME: localhost
      CONNECT_REST_PORT: 8083
      CONNECT_GROUP_ID: kc
      CONNECT_CONFIG_STORAGE_TOPIC: kc-config
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_OFFSET_STORAGE_TOPIC: kc-offsets
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_STATUS_STORAGE_TOPIC: kc-storage
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_KEY_CONVERTER_SCHEMAS_ENABLE: false
      CONNECT_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: false
      CONNECT_PLUGIN_PATH: /test/kafka-connect
      CONNECT_BOOTSTRAP_SERVERS: kafka:9092
      CONNECT_OFFSET_FLUSH_INTERVAL_MS: 500
      # CONNECT_LOG4J_ROOT_LOGLEVEL: DEBUG
      # CONNECT_LOG4J_LOGGERS: org.apache.kafka.connect=DEBUG,org.apache.iceberg=DEBUG
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
    entrypoint:
      - bash
      - -c
      - |
        echo "Starting connector ..."
        ls -la /test/kafka-connect
        ls -la /test/configs
        connect-standalone /test/configs/connect-standalone.properties /test/configs/sink.iceberg.properties
      # export KAFKA_LOG4J_OPTS="-Dlog4j.configuration=file:/etc/kafka/connect-log4j.properties"

  trino:
    image: trinodb/trino:468
    depends_on:
      - iceberg
      - minio
    hostname: trino
    ports:
      - 8080:8080
    environment:
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
    volumes:
      - ./trino-catalog:/etc/trino/catalog